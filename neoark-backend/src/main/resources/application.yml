spring:
  # 1. 데이터베이스 연결 설정
  datasource:
    url: jdbc:mysql://localhost:3306/neoark?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234 # ⚠️ 본인의 MySQL 비밀번호로 반드시 수정하세요!
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 2. JPA/Hibernate 설정
  jpa:
    hibernate:
      ddl-auto: update # 엔티티 수정 시 DB 자동 반영
    show-sql: true     # 실행되는 SQL 출력
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # 4. 파일 업로드 설정 (동식물 사진 업로드 대비)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 5. 서버 포트 설정
server:
  port: 8081